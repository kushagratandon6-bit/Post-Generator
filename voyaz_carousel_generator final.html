<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #FAFAF8; }
  #root { min-height: 100vh; }
  .boot { display:flex; align-items:center; justify-content:center; min-height:100vh; flex-direction:column; gap:16px; color:rgba(0,0,0,0.45); font-weight:600; text-align:center; padding:24px; }
  .boot-spin { width:28px; height:28px; border-radius:50%; border:3px solid #22C55E; border-top-color:transparent; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .errbox { max-width:520px; background:#fff; border:1px solid #FECACA; border-radius:12px; padding:20px 24px; color:#991B1B; text-align:left; font-weight:500; line-height:1.6; }
  .errbox b { display:block; font-size:16px; margin-bottom:8px; color:#7F1D1D; }
  .errbox code { background:#FEF2F2; padding:2px 6px; border-radius:4px; font-size:12px; }
</style>

<div id="root">
  <div class="boot" id="boot">
    <div class="boot-spin"></div>
    <div>Loading Voyaz Carousel Generator…</div>
    <div style="font-size:12px;color:rgba(0,0,0,0.3)">First load fetches React + Babel (~3 MB). On a slow connection give it 10–20 seconds.</div>
  </div>
</div>
<script>
  window.__VOYAZ_MOUNTED = false;
  window.__voyazFail = function (msg, detail) {
    var boot = document.getElementById('boot'); if (!boot) return;
    boot.innerHTML = '<div class="errbox"><b>⚠ Couldn’t start the app</b>' + msg + (detail ? '<br><br><code>' + String(detail).replace(/</g,'&lt;').slice(0,300) + '</code>' : '') + '</div>';
  };
  setTimeout(function () { if (!window.__VOYAZ_MOUNTED) { window.__voyazFail('The page loaded but the app didn’t mount in time. Most likely the React/Babel libraries couldn’t download.<br><br>• Check your internet, then refresh.<br>• A work/school network or VPN may block <code>cdnjs.cloudflare.com</code> — try another network.<br>• Open the console (right-click → Inspect → Console) and tell Claude any red text.'); } }, 12000);
  window.addEventListener('error', function (e) { if (!window.__VOYAZ_MOUNTED && e && e.message) { window.__voyazFail('A script error stopped the app from starting.', e.message); } });
</script>

</script>

// ─── PHOTO SOURCES CONFIG (Unsplash + Pexels) ─────────────────────────────────
// Keys are read at runtime from window.VOYAZ_KEYS (set by the Settings panel).
//   - Unsplash:  https://unsplash.com/developers   (attribution REQUIRED by API terms)
//   - Pexels:    https://www.pexels.com/api/        (credit appreciated; we add it anyway)
// Leave both blank to fall back to Picsum placeholders for layout testing.
//
// SECURITY: keys used in the browser are visible in network requests. For a
// public production build, route these through a serverless proxy that holds
// the keys server-side.
const PHOTO_CFG = {
  APP_NAME: "voyaz",
  get UNSPLASH_KEY() { return (window.VOYAZ_KEYS && window.VOYAZ_KEYS.unsplash) || ""; },
  get PEXELS_KEY() { return (window.VOYAZ_KEYS && window.VOYAZ_KEYS.pexels) || ""; },
};

const OPTIONS_PER_SLOT = 10; // how many candidate photos to offer per slot

// Append the UTM params Unsplash REQUIRES on every link back to them.
function withUTM(url) {
  if (!url) return url;
  const sep = url.includes("?") ? "&" : "?";
  return `${url}${sep}utm_source=${PHOTO_CFG.APP_NAME}&utm_medium=referral&utm_campaign=api-credit`;
}

// Fire the required Unsplash "download" event when a photo is chosen/used.
function triggerUnsplashDownload(downloadLocation) {
  if (!downloadLocation || !PHOTO_CFG.UNSPLASH_KEY) return;
  const sep = downloadLocation.includes("?") ? "&" : "?";
  fetch(`${downloadLocation}${sep}client_id=${PHOTO_CFG.UNSPLASH_KEY}`).catch(() => {});
}

// ── Search Unsplash → array of candidate photo objects ──
async function searchUnsplash(query, count) {
  if (!PHOTO_CFG.UNSPLASH_KEY) return [];
  try {
    const res = await fetch(
      `https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=${count}&orientation=landscape`,
      { headers: { Authorization: `Client-ID ${PHOTO_CFG.UNSPLASH_KEY}` } }
    );
    const json = await res.json();
    return (json?.results || []).map(photo => ({
      url: `${photo.urls.raw}&w=1200&h=1200&fit=crop&crop=entropy&q=85`,
      thumb: `${photo.urls.raw}&w=400&h=400&fit=crop&crop=entropy&q=70`,
      alt: photo.alt_description || query,
      source: "Unsplash",
      photographer: photo.user?.name || "Unknown",
      photographerUrl: withUTM(photo.user?.links?.html),
      sourceUrl: withUTM(photo.links?.html),
      downloadLocation: photo.links?.download_location || null,
      placeholder: false,
    }));
  } catch { return []; }
}

// ── Search Pexels → array of candidate photo objects ──
async function searchPexels(query, count) {
  if (!PHOTO_CFG.PEXELS_KEY) return [];
  try {
    const res = await fetch(
      `https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=${count}&orientation=square`,
      { headers: { Authorization: PHOTO_CFG.PEXELS_KEY } }
    );
    const json = await res.json();
    return (json?.photos || []).map(photo => ({
      url: `${photo.src.large2x}`,
      thumb: `${photo.src.medium}`,
      alt: photo.alt || query,
      source: "Pexels",
      photographer: photo.photographer || "Unknown",
      photographerUrl: photo.photographer_url || null,
      sourceUrl: photo.url || null,
      downloadLocation: null,
      placeholder: false,
    }));
  } catch { return []; }
}

// Search BOTH sources for each query, interleave the results, and return
// up to OPTIONS_PER_SLOT candidates per slot. The first candidate is the
// default selection; the user can switch via the photo picker.
// Returns { [key]: { selected: 0, candidates: [photoObj, ...] } }
async function fetchPhotoOptions(queries) {
  const results = {};
  const hasAnyKey = !!PHOTO_CFG.UNSPLASH_KEY || !!PHOTO_CFG.PEXELS_KEY;

  for (const [key, query] of Object.entries(queries)) {
    if (!hasAnyKey) {
      results[key] = {
        selected: 0,
        candidates: [{
          url: `https://picsum.photos/seed/${encodeURIComponent(query.replace(/\s+/g, "-"))}/1080/1080`,
          thumb: `https://picsum.photos/seed/${encodeURIComponent(query.replace(/\s+/g, "-"))}/400/400`,
          alt: query, source: "Picsum", photographer: null,
          photographerUrl: null, sourceUrl: null, downloadLocation: null,
          placeholder: true,
        }],
      };
      continue;
    }

    const half = Math.ceil(OPTIONS_PER_SLOT / 2);
    const [uns, pex] = await Promise.all([
      searchUnsplash(query, half),
      searchPexels(query, half),
    ]);

    // Interleave so the picker shows variety from both sources.
    const candidates = [];
    const max = Math.max(uns.length, pex.length);
    for (let i = 0; i < max && candidates.length < OPTIONS_PER_SLOT; i++) {
      if (uns[i]) candidates.push(uns[i]);
      if (pex[i] && candidates.length < OPTIONS_PER_SLOT) candidates.push(pex[i]);
    }

    if (candidates.length === 0) {
      candidates.push({
        url: `https://picsum.photos/seed/${encodeURIComponent(query)}/1080/1080`,
        thumb: `https://picsum.photos/seed/${encodeURIComponent(query)}/400/400`,
        alt: query, source: "Picsum", photographer: null,
        photographerUrl: null, sourceUrl: null, downloadLocation: null,
        placeholder: true,
      });
    }

    results[key] = { selected: 0, candidates };
    // Fire the Unsplash download ping for the default-selected candidate if it's Unsplash.
    if (candidates[0]?.source === "Unsplash") triggerUnsplashDownload(candidates[0].downloadLocation);
  }
  return results;
}

// Get the currently-selected photo object for a slot.
function selectedPhoto(slot) {
  if (!slot || !slot.candidates) return null;
  return slot.candidates[slot.selected || 0] || slot.candidates[0] || null;
}

// Build the photo-credit block for the caption. Groups by source, de-dupes names.
function buildCreditLine(photos) {
  const bySource = {}; // { Unsplash: Set, Pexels: Set }
  for (const slot of Object.values(photos)) {
    const p = selectedPhoto(slot);
    if (!p || !p.photographer || p.placeholder) continue;
    (bySource[p.source] = bySource[p.source] || new Set()).add(p.photographer);
  }
  const lines = [];
  for (const [source, names] of Object.entries(bySource)) {
    if (names.size) lines.push(`📷 ${[...names].join(", ")} on ${source}`);
  }
  return lines.join("\n");
}

// Safely read the selected photo's URL for a slot (object-or-string tolerant).
function pUrl(slot) {
  if (!slot) return "";
  if (typeof slot === "string") return slot;
  if (slot.url) return slot.url; // already a photo object
  const p = selectedPhoto(slot);
  return p ? p.url : "";
}

    "s6_p1": "[a NATURE/landscape scene, DIFFERENT from cover — waterfall, mountains, coastline]",

    "s6_p3": "[a signature FOOD/dish, plated and appetizing]"
  }
}`;

  // ── Google Gemini (free tier via Google AI Studio) ──
  // Key is read from the Settings panel (window.VOYAZ_KEYS.gemini).
  // Free tier: ~1,500 requests/day, no credit card. Get a key at
  // https://aistudio.google.com/app/apikey
  const GEMINI_KEY = (typeof window !== "undefined" && window.VOYAZ_KEYS && window.VOYAZ_KEYS.gemini) || "";
  if (!GEMINI_KEY) { throw new Error("NO_GEMINI_KEY"); }

  const MODEL = "gemini-2.5-flash";

  // Pull the first balanced {...} object out of a string, tolerating any
  // stray prose, markdown fences, or trailing characters around it.
  function extractJsonObject(s) {
    if (!s) return null;
    let t = s.replace(/```json/gi, "").replace(/```/g, "").trim();
    const start = t.indexOf("{");
    if (start === -1) return null;
    let depth = 0, inStr = false, esc = false;
    for (let i = start; i < t.length; i++) {
      const ch = t[i];
      if (esc) { esc = false; continue; }
      if (ch === "\\") { esc = true; continue; }
      if (ch === '"') { inStr = !inStr; continue; }
      if (inStr) continue;
      if (ch === "{") depth++;
      else if (ch === "}") { depth--; if (depth === 0) return t.slice(start, i + 1); }
    }
    return null; // unbalanced (likely truncated)
  }

  async function callGemini() {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${GEMINI_KEY}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: {
            temperature: 0.85,
            maxOutputTokens: 8192,            // headroom so JSON isn't truncated
            responseMimeType: "application/json",
            thinkingConfig: { thinkingBudget: 0 }, // don't spend output budget "thinking"
          },
        }),
      }
    );

    if (!res.ok) {
      const errText = await res.text().catch(() => "");
      throw new Error(`GEMINI_HTTP_${res.status}: ${errText.slice(0, 200)}`);
    }

    const data = await res.json();
    const finish = data?.candidates?.[0]?.finishReason;
    const text = data?.candidates?.[0]?.content?.parts?.map(p => p.text || "").join("") || "";
    if (!text) {
      throw new Error(`GEMINI_EMPTY: no text (finishReason: ${finish || "unknown"}).`);
    }

    // Try direct parse, then balanced-object extraction as a fallback.
    try {
      return JSON.parse(text.replace(/```json/gi, "").replace(/```/g, "").trim());
    } catch {
      const block = extractJsonObject(text);
      if (block) return JSON.parse(block);
      throw new Error("GEMINI_BADJSON");
    }
  }

  // Auto-retry once: free models occasionally emit a malformed first response.
  try {
    return await callGemini();
  } catch (e) {
    if (String(e?.message).includes("GEMINI_HTTP_")) throw e; // don't retry hard API errors
    return await callGemini();
  }
}

// ─── SLIDE PREVIEW COMPONENTS (fixed 1080px canvas, auto-scaled to fit) ───────
// Authored at a true 1080×1080 canvas with real pixel sizes, then scaled to the
// preview width. Photos use a "contain + blurred fill" treatment so the WHOLE
// photo is always visible (never cropped at awkward spots), with a soft blurred
// version of the same image filling any leftover space — a clean magazine look.

const CANVAS = 1080;

function ScaledSquare({ children, dark = false, bg = "#F4F9F4" }) {
  const ref = useRef(null);
  const [scale, setScale] = useState(0.5);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const update = () => setScale(el.clientWidth / CANVAS);
    update();
    const ro = new ResizeObserver(update);
    ro.observe(el);
    return () => ro.disconnect();
  }, []);
  return (
    <div ref={ref} style={{
      width: "100%", aspectRatio: "1 / 1", position: "relative",
      overflow: "hidden", borderRadius: 14, boxShadow: "0 6px 28px rgba(0,0,0,0.18)",
      background: dark ? "#111" : bg,
    }}>
      <div style={{
        position: "absolute", top: 0, left: 0, width: CANVAS, height: CANVAS,
        transform: `scale(${scale})`, transformOrigin: "top left",
        background: dark ? "#111" : bg,
      }}>
        {children}
      </div>
    </div>
  );
}

// Shows the ENTIRE photo (no crop) over a blurred fill of itself.
// `fillBg` is used behind the blur for very different aspect ratios.
function Photo({ src, alt, fit = "contain", fillBg = "#0c0c0c", radius = 0 }) {
  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden", background: fillBg, borderRadius: radius }}>
      {fit === "contain" && (
        <img src={src} alt="" aria-hidden="true" style={{
          position: "absolute", inset: 0, width: "100%", height: "100%",
          objectFit: "cover", filter: "blur(22px)", transform: "scale(1.15)", opacity: 0.55,
        }} />
      )}
      <img src={src} alt={alt || ""} style={{
        position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: fit,
      }} />
    </div>
  );
}

// ─── ON-DEMAND SCRIPT LOADER + PNG EXPORT ─────────────────────────────────────
const _loaded = {};
function loadScriptOnce(src) {
  if (_loaded[src]) return _loaded[src];
  _loaded[src] = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
  return _loaded[src];
}

// Capture a DOM node as a 1080×1080 PNG using html-to-image (loaded on demand).
// Photos are hotlinked cross-origin, so we set cors + a pixel ratio to hit 1080.
async function exportNodeToPng(node, filename, scale) {
  await loadScriptOnce("https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js");
  const htmlToImage = window.htmlToImage;
  // pixelRatio chosen so the on-screen node (clientWidth) renders out at 1080px.
  const ratio = node.clientWidth ? (1080 / node.clientWidth) : 2;
  const dataUrl = await htmlToImage.toPng(node, {
    pixelRatio: ratio,
    cacheBust: true,
    backgroundColor: "#ffffff",
  });
  const a = document.createElement("a");
  a.href = dataUrl; a.download = filename; a.click();
}

function VoyazAgent() {
  const [country, setCountry] = useState("");
  const [status, setStatus] = useState("idle"); // idle | loading | done | error
  const [statusMsg, setStatusMsg] = useState("");
  const [data, setData] = useState(null);
  const [photos, setPhotos] = useState({});
  const [currentSlide, setCurrentSlide] = useState(0);

  // Settings (API keys)
  const [showSettings, setShowSettings] = useState(false);
  const [geminiKey, setGeminiKey] = useState(() => { try { return localStorage.getItem("voyaz_gemini") || ""; } catch { return ""; } });
  const [unsplashKey, setUnsplashKey] = useState(() => { try { return localStorage.getItem("voyaz_unsplash") || ""; } catch { return ""; } });
  const [pexelsKey, setPexelsKey] = useState(() => { try { return localStorage.getItem("voyaz_pexels") || ""; } catch { return ""; } });
  if (typeof window !== "undefined") { window.VOYAZ_KEYS = { gemini: geminiKey, unsplash: unsplashKey, pexels: pexelsKey }; }
  const saveKeys = () => {
    try { localStorage.setItem("voyaz_gemini", geminiKey); localStorage.setItem("voyaz_unsplash", unsplashKey); localStorage.setItem("voyaz_pexels", pexelsKey); } catch {}
    window.VOYAZ_KEYS = { gemini: geminiKey, unsplash: unsplashKey, pexels: pexelsKey };
    setShowSettings(false);
  };
  const keysReady = geminiKey && (unsplashKey || pexelsKey);

  // ── Custom EMI + uploaded price sheet ──
  const [priceSheet, setPriceSheet] = useState(() => {
    try { return JSON.parse(localStorage.getItem("voyaz_pricesheet") || "{}"); } catch { return {}; }
  });
  const [priceSheetName, setPriceSheetName] = useState(() => { try { return localStorage.getItem("voyaz_pricesheet_name") || ""; } catch { return ""; } });
  const [emiInput, setEmiInput] = useState("");
  const [totalInput, setTotalInput] = useState("");
  const [downloading, setDownloading] = useState(false);
  const [coverLogo, setCoverLogo] = useState("white"); // "white" | "green" — Slide 1 logo color

  // Format a raw number (e.g. 70000) into "~₹70,000"; pass-through if already a string with ₹.
  const fmtINR = (v) => {
    if (v === null || v === undefined || v === "") return "";
    if (typeof v === "string" && v.includes("₹")) return v;
    const n = Number(String(v).replace(/[^0-9.]/g, ""));
    if (!isFinite(n) || n === 0) return String(v);
    return "~₹" + n.toLocaleString("en-IN");
  };

  // Look up a country in the uploaded price sheet (case/space tolerant).
  const lookupPrice = (name) => {
    if (!name) return null;
    const key = name.trim().toLowerCase();
    for (const k of Object.keys(priceSheet)) {
      if (k.toLowerCase() === key || k.toLowerCase().includes(key) || key.includes(k.toLowerCase())) {
        return priceSheet[k];
      }
    }
    return null;
  };

  // When typing a country, auto-fill the EMI/total bar from the sheet (if present).
  const onCountryChange = (val) => {
    setCountry(val);
    const hit = lookupPrice(val);
    if (hit) {
      setEmiInput(hit.emi ? String(hit.emi) : "");
      setTotalInput(hit.cost ? String(hit.cost) : "");
    }
  };

  // Parse an uploaded .xlsx price sheet using SheetJS (loaded on demand).
  const onUploadSheet = async (file) => {
    if (!file) return;
    try {
      if (!window.XLSX) await loadScriptOnce("https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js");
      const buf = await file.arrayBuffer();
      const wb = window.XLSX.read(buf, { type: "array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
      // Find header row + the Country / Cost / EMI columns by name.
      let hdrIdx = rows.findIndex(r => r.some(c => String(c).toLowerCase().includes("country")));
      if (hdrIdx < 0) hdrIdx = 0;
      const hdr = rows[hdrIdx].map(c => String(c).toLowerCase());
      const cCountry = hdr.findIndex(h => h.includes("country"));
      const cCost = hdr.findIndex(h => h.includes("cost"));
      const cEmi = hdr.findIndex(h => h.includes("emi"));
      const map = {};
      for (let i = hdrIdx + 1; i < rows.length; i++) {
        const r = rows[i];
        const name = String(r[cCountry] || "").trim();
        if (!name) continue;
        if (!map[name]) {
          map[name] = {
            cost: cCost >= 0 ? Number(String(r[cCost]).replace(/[^0-9.]/g, "")) || null : null,
            emi: cEmi >= 0 ? Number(String(r[cEmi]).replace(/[^0-9.]/g, "")) || null : null,
          };
        }
      }
      setPriceSheet(map);
      setPriceSheetName(file.name);
      try { localStorage.setItem("voyaz_pricesheet", JSON.stringify(map)); localStorage.setItem("voyaz_pricesheet_name", file.name); } catch {}
      // If a country is already typed, auto-fill now.
      const hit = (() => { const k = country.trim().toLowerCase(); for (const kk of Object.keys(map)) { if (kk.toLowerCase()===k || kk.toLowerCase().includes(k) || (k && k.includes(kk.toLowerCase()))) return map[kk]; } return null; })();
      if (hit) { setEmiInput(hit.emi ? String(hit.emi) : ""); setTotalInput(hit.cost ? String(hit.cost) : ""); }
    } catch (e) {
      alert("Couldn't read that spreadsheet. Make sure it has columns named Country, Cost, and EMI.");
      console.error(e);
    }
  };

  // Apply manual EMI/total overrides onto the generated content so EVERY slide + caption uses them.
  const applyPriceOverrides = (content) => {
    const c = { ...content };
    const emi = emiInput || (lookupPrice(country)?.emi ?? "");
    const total = totalInput || (lookupPrice(country)?.cost ?? "");
    if (emi) c.price_per_month = fmtINR(emi);
    if (total) c.total_price = fmtINR(total);
    return c;
  };

  // Refs to the off-screen full-size (1080px) slides for PNG export.
  const captureRefs = [useRef(null), useRef(null), useRef(null), useRef(null), useRef(null), useRef(null)];

  const downloadSlide = async (i) => {
    const node = captureRefs[i]?.current;
    if (!node) return;
    setDownloading(true);
    try {
      await exportNodeToPng(node, `${(country || "voyaz").toLowerCase().replace(/\s+/g, "-")}_slide${i + 1}.png`);
    } catch (e) {
      alert("Couldn't export this slide. If photos look missing it's a cross-origin block — try the Pexels photo for that slot, or tell Claude.");
      console.error(e);
    }
    setDownloading(false);
  };

  const downloadAll = async () => {
    setDownloading(true);
    try {
      for (let i = 0; i < 6; i++) {
        const node = captureRefs[i]?.current;
        if (node) {
          await exportNodeToPng(node, `${(country || "voyaz").toLowerCase().replace(/\s+/g, "-")}_slide${i + 1}.png`);
          await new Promise(r => setTimeout(r, 400)); // small gap so browser accepts multiple downloads
        }
      }
    } catch (e) {
      alert("Some slides couldn't export. See console for details.");
      console.error(e);
    }
    setDownloading(false);
  };


  const SLIDE_COMPONENTS = data && photos.cover && pUrl(photos.cover) ? [
    <Slide1 d={data} photos={photos} coverLogo={coverLogo} />,
    <Slide2 d={data} photos={photos} />,
    <Slide3 d={data} photos={photos} />,
    <Slide4 d={data} photos={photos} />,
    <Slide5 d={data} photos={photos} />,
    <Slide6 d={data} photos={photos} />,
  ] : [];

  // Swap which candidate photo is used in a slot, and fire the Unsplash
  // download ping if the newly-selected photo is from Unsplash.
  const selectPhoto = (key, idx) => {
    setPhotos(prev => {
      const slot = prev[key];
      if (!slot) return prev;
      const chosen = slot.candidates?.[idx];
      if (chosen?.source === "Unsplash") triggerUnsplashDownload(chosen.downloadLocation);
      return { ...prev, [key]: { ...slot, selected: idx } };
    });
  };

  const generate = useCallback(async () => {
    if (!country.trim()) return;
    setStatus("loading");
    setData(null);
    setPhotos({});
    setCurrentSlide(0);

    try {
      setStatusMsg("✦ Asking Claude to craft your carousel content...");
      const raw = await generateCountryContent(country.trim());
      const content = applyPriceOverrides(raw);
      setData(content);

      setStatusMsg("✦ Fetching photo options from Unsplash + Pexels...");
      // Build photo queries from content
      const queries = {
        cover: content.photo_queries?.cover || `${country} landscape aerial`,
        s2_p1: content.photo_queries?.s2_p1 || `${country} market food`,
        s2_p2: content.photo_queries?.s2_p2 || `${country} beach`,
        s2_p3: content.photo_queries?.s2_p3 || `${country} city night`,
        s3_p1: content.places?.[0]?.photo_query || `${country} ${content.places?.[0]?.name || ""}`,
        s3_p2: content.places?.[1]?.photo_query || `${country} ${content.places?.[1]?.name || ""}`,
        s3_p3: content.places?.[2]?.photo_query || `${country} ${content.places?.[2]?.name || ""}`,
        s5_p1: content.photo_queries?.s5_p1 || `${country} islands aerial`,
        s5_p2: content.photo_queries?.s5_p2 || `${country} local people culture`,
        s5_p3: content.photo_queries?.s5_p3 || `${country} food dish`,
        s6_p1: content.photo_queries?.s6_p1 || `${country} landscape nature`,
        s6_p2: content.photo_queries?.s6_p2 || `${country} people festival culture`,
        s6_p3: content.photo_queries?.s6_p3 || `${country} traditional food dish`,
      };
      const fetchedPhotos = await fetchPhotoOptions(queries);
      setPhotos(fetchedPhotos);

      setStatus("done");
      setStatusMsg("");
    } catch (e) {
      setStatus("error");
      const msg = String(e?.message || "");
      if (msg.includes("NO_GEMINI_KEY")) {
        setStatusMsg("Add your free Google Gemini API key in Settings (top right) to generate slide copy.");
      } else if (msg.includes("GEMINI_HTTP_429") || msg.includes("RESOURCE_EXHAUSTED")) {
        setStatusMsg("Gemini's free daily limit was hit. Try again in a bit, or tomorrow when the quota resets.");
      } else if (msg.includes("GEMINI_HTTP_400") || msg.includes("API_KEY_INVALID")) {
        setStatusMsg("That Gemini key looks invalid. Re-copy it from aistudio.google.com and save again.");
      } else if (msg.includes("GEMINI_HTTP_404")) {
        setStatusMsg("Gemini rejected the model name (it may have been retired). Tell Claude to update the model.");
      } else if (msg.includes("GEMINI_BADJSON") || msg.includes("GEMINI_EMPTY") || msg.includes("JSON")) {
        setStatusMsg("The model returned malformed data twice. Hit Generate once more — it almost always works on the next try.");
      } else {
        setStatusMsg("Something went wrong: " + msg.slice(0, 120) + ". Check Settings, then retry.");
      }
      console.error(e);
    }
  }, [country]);

  const popularCountries = ["Vietnam", "Bali", "Sri Lanka", "Turkey", "Georgia", "Japan", "Nepal", "Spain"];

  return (
    <div style={{
      minHeight: "100vh", background: "#FAFAF8",
      fontFamily: "'Inter', -apple-system, sans-serif",
    }}>
      {/* Header */}
      <div style={{
        background: "#fff", borderBottom: "1px solid rgba(0,0,0,0.07)",
        padding: "20px 24px",
        display: "flex", alignItems: "center", gap: 16,
      }}>
        <div style={{
          fontWeight: 900, fontSize: 20, letterSpacing: "0.35em",
          color: BRAND.green,
        }}>VOYAZ</div>
        <div style={{
          width: 1, height: 28, background: "rgba(0,0,0,0.1)",
        }} />
        <div style={{ fontSize: 14, fontWeight: 600, color: "rgba(0,0,0,0.5)" }}>
          Carousel Generator
        </div>
        <div style={{ flex: 1 }} />
        <button onClick={() => setShowSettings(s => !s)} style={{
          padding: "8px 16px", borderRadius: 100,
          background: keysReady ? "rgba(34,197,94,0.1)" : "rgba(239,68,68,0.08)",
          border: `1px solid ${keysReady ? "rgba(34,197,94,0.3)" : "rgba(239,68,68,0.25)"}`,
          color: keysReady ? BRAND.green : "#EF4444",
          fontWeight: 700, fontSize: 13, cursor: "pointer",
        }}>{keysReady ? "⚙ Keys set" : "⚙ Add API keys"}</button>
      </div>

      {showSettings && (
        <div style={{ background: "#fff", borderBottom: "1px solid rgba(0,0,0,0.07)", padding: "20px 24px" }}>
          <div style={{ maxWidth: 900, margin: "0 auto" }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: BRAND.dark, marginBottom: 4 }}>API Keys — all free, no credit card</div>
            <div style={{ fontSize: 12, color: "rgba(0,0,0,0.45)", marginBottom: 16, lineHeight: 1.5 }}>
              Stored only in this browser (localStorage) — never uploaded. You need the Gemini key (writes the copy, free up to 1,500/day)
              plus at least one photo key (Unsplash and/or Pexels — using both gives more photo options per slide).
            </div>
            {[
              { label: "Google Gemini API key", val: geminiKey, set: setGeminiKey, ph: "AIza...", link: "https://aistudio.google.com/app/apikey", req: true },
              { label: "Unsplash Access Key", val: unsplashKey, set: setUnsplashKey, ph: "Unsplash Access Key", link: "https://unsplash.com/developers", req: false },
              { label: "Pexels API Key", val: pexelsKey, set: setPexelsKey, ph: "Pexels API Key", link: "https://www.pexels.com/api/", req: false },
            ].map((f, i) => (
              <div key={i} style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "rgba(0,0,0,0.55)", marginBottom: 6 }}>
                  {f.label} {f.req ? <span style={{ color: "#EF4444" }}>*</span> : <span style={{ color: "rgba(0,0,0,0.3)" }}>(optional)</span>}
                  &nbsp;<a href={f.link} target="_blank" rel="noreferrer" style={{ color: BRAND.green, fontWeight: 700, textDecoration: "none", fontSize: 11 }}>↗ get one free</a>
                </div>
                <input type="password" value={f.val} onChange={e => f.set(e.target.value)} placeholder={f.ph}
                  style={{ width: "100%", padding: "10px 14px", borderRadius: 8, border: "1.5px solid rgba(0,0,0,0.1)", fontSize: 13, fontFamily: "monospace", outline: "none", boxSizing: "border-box" }} />
              </div>
            ))}
            <button onClick={saveKeys} style={{ padding: "10px 24px", borderRadius: 8, background: BRAND.green, color: "#fff", border: "none", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>Save keys</button>
          </div>
        </div>
      )}

      <div style={{ maxWidth: 900, margin: "0 auto", padding: "24px 16px" }}>

        {/* Input card */}
        <div style={{
          background: "#fff", borderRadius: 16,
          border: "1px solid rgba(0,0,0,0.07)",
          padding: "24px", marginBottom: 20,
          boxShadow: "0 2px 16px rgba(0,0,0,0.04)",
        }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "rgba(0,0,0,0.4)", letterSpacing: "0.1em", marginBottom: 12 }}>
            ✦ GENERATE A NEW CAROUSEL
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <input
              value={country}
              onChange={e => onCountryChange(e.target.value)}
              onKeyDown={e => e.key === "Enter" && generate()}
              placeholder="Type a country name... e.g. Vietnam"
              style={{
                flex: 1, padding: "12px 16px", borderRadius: 10,
                border: "1.5px solid rgba(0,0,0,0.1)", fontSize: 15,
                fontWeight: 600, outline: "none", color: BRAND.dark,
                background: "#FAFAFA",
              }}
            />
            <button
              onClick={generate}
              disabled={status === "loading" || !country.trim()}
              style={{
                padding: "12px 24px", borderRadius: 10,
                background: status === "loading" ? "rgba(34,197,94,0.5)" : BRAND.green,
                color: "#fff", border: "none", fontWeight: 900, fontSize: 15,
                cursor: status === "loading" ? "not-allowed" : "pointer",
                letterSpacing: "0.03em", transition: "opacity 0.15s",
                whiteSpace: "nowrap",
              }}
            >
              {status === "loading" ? "Generating..." : "Generate Carousel →"}
            </button>
          </div>

          {/* Quick picks */}
          <div style={{ marginTop: 14, display: "flex", gap: 8, flexWrap: "wrap" }}>
            <span style={{ fontSize: 12, color: "rgba(0,0,0,0.35)", fontWeight: 600, alignSelf: "center" }}>Try:</span>
            {popularCountries.map(c => (
              <button key={c} onClick={() => onCountryChange(c)}
                style={{
                  padding: "5px 12px", borderRadius: 100,
                  background: country === c ? BRAND.green : "rgba(0,0,0,0.05)",
                  color: country === c ? "#fff" : "rgba(0,0,0,0.55)",
                  border: "none", cursor: "pointer", fontSize: 12, fontWeight: 700,
                  transition: "all 0.12s",
                }}>{c}</button>
            ))}
          </div>
        </div>

        {/* Custom EMI + price sheet */}
        <div style={{
          background: "#fff", borderRadius: 16, border: "1px solid rgba(0,0,0,0.07)",
          padding: "20px 24px", marginBottom: 20, boxShadow: "0 2px 16px rgba(0,0,0,0.04)",
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: "rgba(0,0,0,0.4)", letterSpacing: "0.06em" }}>
              💸 CUSTOM EMI — exact amount shown in the post
            </div>
            <label style={{
              fontSize: 12, fontWeight: 700, color: BRAND.green, cursor: "pointer",
              border: `1px solid rgba(34,197,94,0.4)`, borderRadius: 100, padding: "5px 14px",
            }}>
              {priceSheetName ? `✓ ${priceSheetName}` : "↑ Upload price sheet (.xlsx)"}
              <input type="file" accept=".xlsx,.xls,.csv" style={{ display: "none" }}
                onChange={e => onUploadSheet(e.target.files?.[0])} />
            </label>
          </div>
          <div style={{ display: "flex", gap: 12 }}>
            <input
              value={emiInput}
              onChange={e => setEmiInput(e.target.value)}
              placeholder="EMI / month — e.g. 2500"
              style={{ flex: 1, padding: "11px 14px", borderRadius: 10, border: `1.5px solid ${emiInput ? "rgba(34,197,94,0.5)" : "rgba(0,0,0,0.1)"}`, fontSize: 14, fontWeight: 700, outline: "none", color: BRAND.dark, background: emiInput ? "rgba(34,197,94,0.05)" : "#FAFAFA" }}
            />
            <input
              value={totalInput}
              onChange={e => setTotalInput(e.target.value)}
              placeholder="Total all-in — e.g. 70000"
              style={{ flex: 1, padding: "11px 14px", borderRadius: 10, border: "1.5px solid rgba(0,0,0,0.1)", fontSize: 14, fontWeight: 700, outline: "none", color: BRAND.dark, background: "#FAFAFA" }}
            />
          </div>
          <div style={{ fontSize: 12, color: "rgba(0,0,0,0.4)", marginTop: 8, lineHeight: 1.5 }}>
            {priceSheetName
              ? <>Loaded <b>{Object.keys(priceSheet).length} countries</b> from your sheet. Type a country and it auto-fills — these exact amounts go into every slide + caption. Override anytime above. Leave blank to use the auto value.</>
              : <>Type the EMI and total to use exact amounts, or upload your price sheet to auto-fill by country. Leave blank to let the generator estimate.</>}
          </div>
        </div>

        {/* Status */}
        {status === "loading" && (
          <div style={{
            background: "#fff", borderRadius: 12,
            border: "1px solid rgba(34,197,94,0.2)",
            padding: "20px 24px", marginBottom: 20,
            display: "flex", alignItems: "center", gap: 12,
          }}>
            <div style={{
              width: 20, height: 20, borderRadius: "50%",
              border: `2px solid ${BRAND.green}`,
              borderTopColor: "transparent",
              animation: "spin 0.8s linear infinite",
            }} />
            <div style={{ fontSize: 14, fontWeight: 600, color: BRAND.dark }}>{statusMsg}</div>
            <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
          </div>
        )}

        {status === "error" && (
          <div style={{
            background: "#fff", borderRadius: 12,
            border: "1px solid rgba(239,68,68,0.2)",
            padding: "16px 24px", marginBottom: 20,
            fontSize: 14, fontWeight: 600, color: "#EF4444",
          }}>{statusMsg}</div>
        )}

        {/* Slides preview */}
        {status === "done" && data && SLIDE_COMPONENTS.length > 0 && (
          <>
            {/* Country info strip */}
            <div style={{
              background: "#fff", borderRadius: 12,
              border: "1px solid rgba(0,0,0,0.07)",
              padding: "16px 20px", marginBottom: 16,
              display: "flex", justifyContent: "space-between", alignItems: "center",
            }}>
              <div>
                <div style={{ fontSize: 22, fontWeight: 900, color: BRAND.dark }}>
                  {data.flag} {data.country}
                </div>
                <div style={{ fontSize: 13, color: "rgba(0,0,0,0.45)", fontWeight: 600, marginTop: 2 }}>
                  {data.tagline}
                </div>
              </div>
              <div style={{
                background: BRAND.green, color: "#fff",
                borderRadius: 10, padding: "8px 16px",
                fontSize: 13, fontWeight: 900,
              }}>{data.price_per_month}/month</div>
            </div>

            <SlideNavigator current={currentSlide} total={6} onChange={setCurrentSlide} />

            {/* Cover logo color toggle — only relevant on Slide 1 */}
            {currentSlide === 0 && (
              <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 10, marginBottom: 12 }}>
                <span style={{ fontSize: 12, fontWeight: 700, color: "rgba(0,0,0,0.4)" }}>Cover logo:</span>
                {["white", "green"].map(c => (
                  <button key={c} onClick={() => setCoverLogo(c)}
                    style={{
                      padding: "5px 14px", borderRadius: 100, cursor: "pointer", fontSize: 12, fontWeight: 700,
                      border: `1px solid ${coverLogo === c ? BRAND.green : "rgba(0,0,0,0.12)"}`,
                      background: coverLogo === c ? "rgba(34,197,94,0.1)" : "#fff",
                      color: coverLogo === c ? BRAND.green : "rgba(0,0,0,0.55)",
                      textTransform: "capitalize",
                    }}>{c}</button>
                ))}
              </div>
            )}

            {/* Slide display */}
            <div style={{ maxWidth: 540, margin: "0 auto" }}>
              {SLIDE_COMPONENTS[currentSlide]}
            </div>

            {/* Download buttons */}
            <div style={{ display: "flex", justifyContent: "center", gap: 12, marginTop: 16, flexWrap: "wrap" }}>
              <button onClick={() => downloadSlide(currentSlide)} disabled={downloading}
                style={{ padding: "11px 22px", borderRadius: 100, background: "#fff", border: `1.5px solid ${BRAND.green}`, color: BRAND.green, fontWeight: 800, fontSize: 14, cursor: downloading ? "wait" : "pointer" }}>
                ↓ Download this slide
              </button>
              <button onClick={downloadAll} disabled={downloading}
                style={{ padding: "11px 24px", borderRadius: 100, background: downloading ? "rgba(34,197,94,0.5)" : BRAND.green, border: "none", color: "#fff", fontWeight: 800, fontSize: 14, cursor: downloading ? "wait" : "pointer" }}>
                {downloading ? "Exporting…" : "↓ Download all 6 (PNG)"}
              </button>
            </div>
            <div style={{ textAlign: "center", fontSize: 11, color: "rgba(0,0,0,0.35)", marginTop: 8 }}>
              Exports at full 1080×1080. If your browser asks, allow multiple downloads.
            </div>

            {/* Off-screen full-size (1080px) render stack used only for PNG capture */}
            <div style={{ position: "fixed", left: -20000, top: 0, width: 1080, pointerEvents: "none", opacity: 1 }} aria-hidden="true">
              {SLIDE_COMPONENTS.map((Comp, i) => (
                <div key={i} ref={captureRefs[i]} style={{ width: 1080, height: 1080 }}>
                  {Comp}
                </div>
              ))}
            </div>

            {/* Prev/Next */}
            <div style={{
              display: "flex", justifyContent: "center", gap: 12, marginTop: 16,
            }}>
              <button
                onClick={() => setCurrentSlide(s => Math.max(0, s - 1))}
                disabled={currentSlide === 0}
                style={{
                  padding: "10px 22px", borderRadius: 100,
                  background: currentSlide === 0 ? "rgba(0,0,0,0.05)" : "#fff",
                  border: "1.5px solid rgba(0,0,0,0.1)",
                  color: currentSlide === 0 ? "rgba(0,0,0,0.3)" : BRAND.dark,
                  fontWeight: 700, fontSize: 14, cursor: currentSlide === 0 ? "not-allowed" : "pointer",
                }}>← Prev</button>
              <div style={{
                padding: "10px 20px", fontSize: 14, fontWeight: 700,
                color: "rgba(0,0,0,0.35)", alignSelf: "center",
              }}>{currentSlide + 1} / 6</div>
              <button
                onClick={() => setCurrentSlide(s => Math.min(5, s + 1))}
                disabled={currentSlide === 5}
                style={{
                  padding: "10px 22px", borderRadius: 100,
                  background: currentSlide === 5 ? "rgba(0,0,0,0.05)" : BRAND.green,
                  border: "none",
                  color: currentSlide === 5 ? "rgba(0,0,0,0.3)" : "#fff",
                  fontWeight: 700, fontSize: 14, cursor: currentSlide === 5 ? "not-allowed" : "pointer",
                }}>Next →</button>
            </div>

            {/* Photo picker */}
            <PhotoPicker photos={photos} onSelect={selectPhoto} />

            {/* Caption + photo credits */}
            <CaptionPanel data={data} photos={photos} />

            {/* Generated data inspector */}
            <div style={{
              marginTop: 24, background: "#fff", borderRadius: 12,
              border: "1px solid rgba(0,0,0,0.07)", overflow: "hidden",
            }}>
              <div style={{
                padding: "14px 20px",
                borderBottom: "1px solid rgba(0,0,0,0.06)",
                fontSize: 13, fontWeight: 700, color: "rgba(0,0,0,0.5)",
                letterSpacing: "0.08em",
              }}>✦ GENERATED CONTENT DATA</div>
              <pre style={{
                padding: "16px 20px", fontSize: 11, lineHeight: 1.6,
                color: "rgba(0,0,0,0.6)", overflowX: "auto",
                maxHeight: 320, overflow: "auto",
                background: "#FAFAFA", margin: 0,
              }}>{JSON.stringify(data, null, 2)}</pre>
            </div>
          </>
        )}

        {/* Empty state */}
        {status === "idle" && (
          <div style={{
            textAlign: "center", padding: "60px 20px",
            color: "rgba(0,0,0,0.3)",
          }}>
            <div style={{ fontSize: 48, marginBottom: 12 }}>✈️</div>
            <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 6 }}>
              Type a country and hit Generate
            </div>
            <div style={{ fontSize: 14 }}>
              Claude will write all 6 slides in the Voyaz Thailand format — cover, costs, places, itinerary, two paths, and close.
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


try {
  const rootEl = document.getElementById("root");
  const root = ReactDOM.createRoot(rootEl);
  root.render(<VoyazAgent />);
  window.__VOYAZ_MOUNTED = true;
} catch (err) {
  window.__voyazFail("The app code hit an error while starting.", err && err.message ? err.message : err);
  console.error("Voyaz mount error:", err);
}
</script>
</body>
</html>
