<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voyaz — Carousel Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #FAFAF8; }
  #root { min-height: 100vh; }
  .boot { display:flex; align-items:center; justify-content:center; min-height:100vh; flex-direction:column; gap:16px; color:rgba(0,0,0,0.45); font-weight:600; text-align:center; padding:24px; }
  .boot-spin { width:28px; height:28px; border-radius:50%; border:3px solid #22C55E; border-top-color:transparent; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .errbox { max-width:520px; background:#fff; border:1px solid #FECACA; border-radius:12px; padding:20px 24px; color:#991B1B; text-align:left; font-weight:500; line-height:1.6; }
  .errbox b { display:block; font-size:16px; margin-bottom:8px; color:#7F1D1D; }
  .errbox code { background:#FEF2F2; padding:2px 6px; border-radius:4px; font-size:12px; }
</style>
</head>
<body>
<div id="root">
  <div class="boot" id="boot">
    <div class="boot-spin"></div>
    <div>Loading Voyaz Carousel Generator…</div>
    <div style="font-size:12px;color:rgba(0,0,0,0.3)">First load fetches React + Babel (~3 MB). On a slow connection give it 10–20 seconds.</div>
  </div>
</div>
<script>
  window.__VOYAZ_MOUNTED = false;
  window.__voyazFail = function (msg, detail) {
    var boot = document.getElementById('boot'); if (!boot) return;
    boot.innerHTML = '<div class="errbox"><b>⚠ Couldn’t start the app</b>' + msg + (detail ? '<br><br><code>' + String(detail).replace(/</g,'&lt;').slice(0,300) + '</code>' : '') + '</div>';
  };
  setTimeout(function () { if (!window.__VOYAZ_MOUNTED) { window.__voyazFail('The page loaded but the app didn’t mount in time. Most likely the React/Babel libraries couldn’t download.<br><br>• Check your internet, then refresh.<br>• A work/school network or VPN may block <code>cdnjs.cloudflare.com</code> — try another network.<br>• Open the console (right-click → Inspect → Console) and tell Claude any red text.'); } }, 12000);
  window.addEventListener('error', function (e) { if (!window.__VOYAZ_MOUNTED && e && e.message) { window.__voyazFail('A script error stopped the app from starting.', e.message); } });
</script>

// ─── PHOTO SOURCES CONFIG (Unsplash + Pexels) ─────────────────────────────────
// Keys are read at runtime from window.VOYAZ_KEYS (set by the Settings panel).
//   - Unsplash:  https://unsplash.com/developers   (attribution REQUIRED by API terms)
//   - Pexels:    https://www.pexels.com/api/        (credit appreciated; we add it anyway)
// Leave both blank to fall back to Picsum placeholders for layout testing.
//
// SECURITY: keys used in the browser are visible in network requests. For a
// public production build, route these through a serverless proxy that holds
// the keys server-side.
const PHOTO_CFG = {
  APP_NAME: "voyaz",
  get UNSPLASH_KEY() {
    return window.VOYAZ_KEYS && window.VOYAZ_KEYS.unsplash || "";
  },
  get PEXELS_KEY() {
    return window.VOYAZ_KEYS && window.VOYAZ_KEYS.pexels || "";
  }
};
const OPTIONS_PER_SLOT = 8; // how many candidate photos to offer per slot
const COVER_OPTIONS = 8; // extra options for the all-important cover slot

// Append the UTM params Unsplash REQUIRES on every link back to them.
function withUTM(url) {
  if (!url) return url;
  const sep = url.includes("?") ? "&" : "?";
  return `${url}${sep}utm_source=${PHOTO_CFG.APP_NAME}&utm_medium=referral&utm_campaign=api-credit`;
}

// Fire the required Unsplash "download" event when a photo is chosen/used.
function triggerUnsplashDownload(downloadLocation) {
  if (!downloadLocation || !PHOTO_CFG.UNSPLASH_KEY) return;
  const sep = downloadLocation.includes("?") ? "&" : "?";
  fetch(`${downloadLocation}${sep}client_id=${PHOTO_CFG.UNSPLASH_KEY}`).catch(() => {});
}

// ── Search Unsplash → array of candidate photo objects ──
async function searchUnsplash(query, count) {
  if (!PHOTO_CFG.UNSPLASH_KEY) return [];
  try {
    const res = await fetch(`https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=${count}&orientation=landscape`, {
      headers: {
        Authorization: `Client-ID ${PHOTO_CFG.UNSPLASH_KEY}`
      }
    });
    const json = await res.json();
    return (json?.results || []).map(photo => ({
      url: `${photo.urls.raw}&w=1200&h=1200&fit=crop&crop=entropy&q=85`,
      thumb: `${photo.urls.raw}&w=400&h=400&fit=crop&crop=entropy&q=70`,
      alt: photo.alt_description || query,
      source: "Unsplash",
      photographer: photo.user?.name || "Unknown",
      photographerUrl: withUTM(photo.user?.links?.html),
      sourceUrl: withUTM(photo.links?.html),
      downloadLocation: photo.links?.download_location || null,
      placeholder: false
    }));
  } catch {
    return [];
  }
}

// ── Search Pexels → array of candidate photo objects ──
async function searchPexels(query, count) {
  if (!PHOTO_CFG.PEXELS_KEY) return [];
  try {
    const res = await fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=${count}&orientation=square`, {
      headers: {
        Authorization: PHOTO_CFG.PEXELS_KEY
      }
    });
    const json = await res.json();
    return (json?.photos || []).map(photo => ({
      url: `${photo.src.large2x}`,
      thumb: `${photo.src.medium}`,
      alt: photo.alt || query,
      source: "Pexels",
      photographer: photo.photographer || "Unknown",
      photographerUrl: photo.photographer_url || null,
      sourceUrl: photo.url || null,
      downloadLocation: null,
      placeholder: false
    }));
  } catch {
    return [];
  }
}

// Search BOTH sources for each query, interleave the results, and return
// up to OPTIONS_PER_SLOT candidates per slot (COVER_OPTIONS for the cover). 
// The first candidate is the default selection; the user can switch via the photo picker.
// Returns { [key]: { selected: 0, candidates: [photoObj, ...] } }
async function fetchPhotoOptions(queries, slotCounts = {}) {
  const results = {};
  const hasAnyKey = !!PHOTO_CFG.UNSPLASH_KEY || !!PHOTO_CFG.PEXELS_KEY;
  for (const [key, query] of Object.entries(queries)) {
    const maxForSlot = slotCounts[key] || OPTIONS_PER_SLOT;
    if (!hasAnyKey) {
      results[key] = {
        selected: 0,
        candidates: [{
          url: `https://picsum.photos/seed/${encodeURIComponent(query.replace(/\s+/g, "-"))}/1080/1080`,
          thumb: `https://picsum.photos/seed/${encodeURIComponent(query.replace(/\s+/g, "-"))}/400/400`,
          alt: query,
          source: "Picsum",
          photographer: null,
          photographerUrl: null,
          sourceUrl: null,
          downloadLocation: null,
          placeholder: true
        }]
      };
      continue;
    }
    const half = Math.ceil(maxForSlot / 2);
    const [uns, pex] = await Promise.all([searchUnsplash(query, half), searchPexels(query, half)]);

    // Interleave so the picker shows variety from both sources.
    const candidates = [];
    const max = Math.max(uns.length, pex.length);
    for (let i = 0; i < max && candidates.length < maxForSlot; i++) {
      if (uns[i]) candidates.push(uns[i]);
      if (pex[i] && candidates.length < maxForSlot) candidates.push(pex[i]);
    }
    if (candidates.length === 0) {
      candidates.push({
        url: `https://picsum.photos/seed/${encodeURIComponent(query)}/1080/1080`,
        thumb: `https://picsum.photos/seed/${encodeURIComponent(query)}/400/400`,
        alt: query,
        source: "Picsum",
        photographer: null,
        photographerUrl: null,
        sourceUrl: null,
        downloadLocation: null,
        placeholder: true
      });
    }
    results[key] = {
      selected: 0,
      candidates
    };
    // Fire the Unsplash download ping for the default-selected candidate if it's Unsplash.
    if (candidates[0]?.source === "Unsplash") triggerUnsplashDownload(candidates[0].downloadLocation);
  }
  return results;
}

// Get the currently-selected photo object for a slot.
function selectedPhoto(slot) {
  if (!slot || !slot.candidates) return null;
  return slot.candidates[slot.selected || 0] || slot.candidates[0] || null;
}

// Build the photo-credit block for the caption. Groups by source, de-dupes names.
function buildCreditLine(photos) {
  const bySource = {}; // { Unsplash: Set, Pexels: Set }
  for (const slot of Object.values(photos)) {
    const p = selectedPhoto(slot);
    if (!p || !p.photographer || p.placeholder) continue;
    (bySource[p.source] = bySource[p.source] || new Set()).add(p.photographer);
  }
  const lines = [];
  for (const [source, names] of Object.entries(bySource)) {
    if (names.size) lines.push(`📷 ${[...names].join(", ")} on ${source}`);
  }
  return lines.join("\n");
}

// Safely read the selected photo's URL for a slot (object-or-string tolerant).
function pUrl(slot) {
  if (!slot) return "";
  if (typeof slot === "string") return slot;
  if (slot.url) return slot.url; // already a photo object
  const p = selectedPhoto(slot);
  return p ? p.url : "";
}
